<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DeepAgent — AI Research Assistant</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap');

:root {
  --bg-base: #0b0f19;
  --bg-surface: rgba(15, 23, 42, 0.45);
  --border-color: rgba(255, 255, 255, 0.08);
  --border-color-hover: rgba(255, 255, 255, 0.15);
  --color-primary: #8b5cf6;
  --color-primary-rgb: 139, 92, 246;
  --color-secondary: #06b6d4;
  --color-secondary-rgb: 6, 182, 212;
  --color-success: #10b981;
  --color-error: #ef4444;
  --color-warning: #f59e0b;

  --text-primary: #f9fafb;
  --text-secondary: #d1d5db;
  --text-muted: #6b7280;

  --font-heading: 'Outfit', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'Fira Code', monospace;

  --shadow-glow: 0 0 25px rgba(139, 92, 246, 0.2);
  --shadow-neon: 0 0 20px rgba(6, 182, 212, 0.25);
  --glass-blur: blur(16px);
  --border-radius: 16px;
  --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--bg-base);
  color: var(--text-secondary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  height: 100vh;
}

#root { height: 100%; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.3); }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; transition: var(--transition-smooth); }
::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

h1, h2, h3, h4, h5, h6 { font-family: var(--font-heading); color: var(--text-primary); font-weight: 600; letter-spacing: -0.02em; }
a { color: var(--color-secondary); text-decoration: none; transition: var(--transition-smooth); }
a:hover { color: #22d3ee; }

.app-container { display: flex; height: 100vh; width: 100vw; background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, var(--bg-base) 70%); }
.main-content { flex: 1; overflow-y: auto; padding: 2.5rem; display: flex; flex-direction: column; min-width: 0; }

.glass-panel { background: var(--bg-surface); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: var(--border-radius); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); transition: var(--transition-smooth); }
.glass-panel-hover:hover { border-color: var(--border-color-hover); box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4); transform: translateY(-2px); }

button { font-family: inherit; }

.btn-primary { background: linear-gradient(135deg, var(--color-primary), #6d28d9); color: var(--text-primary); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 0.75rem 1.5rem; font-family: var(--font-heading); font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; transition: var(--transition-smooth); }
.btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: var(--shadow-glow); filter: brightness(1.1); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-secondary { background: rgba(255, 255, 255, 0.05); color: var(--text-secondary); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.75rem 1.5rem; font-family: var(--font-heading); font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; transition: var(--transition-smooth); }
.btn-secondary:hover:not(:disabled) { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); color: var(--text-primary); }
.btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

.form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
.form-label { font-size: 0.875rem; font-weight: 500; color: var(--text-primary); }
.form-input, .form-select, .form-textarea { background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.75rem 1rem; color: var(--text-primary); font-family: var(--font-body); font-size: 0.95rem; transition: var(--transition-smooth); width: 100%; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15); background: rgba(15, 23, 42, 0.80); }
.form-textarea { resize: vertical; line-height: 1.5; min-height: 100px; font-family: var(--font-body); }
select.form-select { appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='none' stroke='%236b7280' stroke-width='2'><path d='M2 4l5 5 5-5'/></svg>"); background-repeat: no-repeat; background-position: right 0.8rem center; padding-right: 2.2rem; }

.badge { display: inline-flex; align-items: center; padding: 0.25rem 0.625rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.badge-success { background: rgba(16, 185, 129, 0.12); color: var(--color-success); border: 1px solid rgba(16, 185, 129, 0.25); }
.badge-warning { background: rgba(245, 158, 11, 0.12); color: var(--color-warning); border: 1px solid rgba(245, 158, 11, 0.25); }
.badge-error { background: rgba(239, 68, 68, 0.12); color: var(--color-error); border: 1px solid rgba(239, 68, 68, 0.25); }
.badge-info { background: rgba(6, 182, 212, 0.12); color: var(--color-secondary); border: 1px solid rgba(6, 182, 212, 0.25); }

@keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); } 50% { box-shadow: 0 0 25px rgba(6, 182, 212, 0.5); } }
.pulse-glow { animation: pulseGlow 2s infinite; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.spin { animation: spin 1.2s linear infinite; display: inline-flex; }

.text-gradient { background: linear-gradient(135deg, #ffffff 30%, var(--color-secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.glow-hover:hover { border-color: rgba(6, 182, 212, 0.4); box-shadow: 0 0 20px rgba(6, 182, 212, 0.15); transform: translateY(-2px); }
.sidebar-link-active { background: rgba(139, 92, 246, 0.12); border-left: 3px solid var(--color-primary); box-shadow: inset 10px 0 20px -10px rgba(139, 92, 246, 0.2); }

/* ---- Layout: Sidebar ---- */
.sidebar { width: 260px; height: calc(100vh - 2rem); margin: 1rem 0 1rem 1rem; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 2.5rem; flex-shrink: 0; }
.brand { display: flex; align-items: center; gap: 0.75rem; }
.brand-mark { background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: var(--shadow-glow); flex-shrink: 0; }
.brand-title { font-size: 1.15rem; font-weight: 800; line-height: 1; }
.brand-sub { font-size: 0.7rem; color: var(--text-muted); }
.nav { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
.nav-btn { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1rem; border: none; border-radius: 10px; background: transparent; color: var(--text-secondary); cursor: pointer; text-align: left; font-family: var(--font-heading); font-weight: 500; font-size: 0.92rem; transition: var(--transition-smooth); width: 100%; }
.nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.02); }
.nav-btn.active { background: rgba(139, 92, 246, 0.12); color: var(--text-primary); font-weight: 600; }
.nav-btn:disabled { color: var(--text-muted); cursor: not-allowed; opacity: 0.4; }
.sidebar-footer { display: flex; align-items: center; gap: 0.75rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ---- Dashboard ---- */
.onboard-banner { position: relative; overflow: hidden; padding: 2.25rem 2.5rem; margin-bottom: 2.5rem; display: flex; align-items: center; justify-content: space-between; gap: 2rem; flex-wrap: wrap; border: 1px solid rgba(139, 92, 246, 0.25); background: linear-gradient(135deg, rgba(139, 92, 246, 0.10), rgba(6, 182, 212, 0.06)); }
.onboard-banner::before { content: ''; position: absolute; top: -60px; right: -60px; width: 220px; height: 220px; background: radial-gradient(circle, rgba(139, 92, 246, 0.25), transparent 70%); pointer-events: none; }
.onboard-banner-icon { background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: var(--shadow-glow); flex-shrink: 0; }
.onboard-banner-text h2 { font-size: 1.35rem; margin-bottom: 0.35rem; }
.onboard-banner-text p { color: var(--text-secondary); font-size: 0.9rem; max-width: 480px; line-height: 1.5; }
.onboard-banner-actions { display: flex; gap: 0.75rem; z-index: 1; flex-shrink: 0; }
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem; }
.page-header h1 { font-size: 2.25rem; margin-bottom: 0.5rem; }
.page-header p { color: var(--text-muted); }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
.stat-card { padding: 1.5rem; display: flex; align-items: center; gap: 1rem; }
.stat-icon { padding: 0.75rem; border-radius: 12px; display: flex; }
.stat-label { font-size: 0.8rem; color: var(--text-muted); }
.stat-value { font-size: 1.5rem; font-weight: bold; color: var(--text-primary); }
.workspace-panel { padding: 2rem; }
.filter-row { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
.search-wrap { position: relative; flex: 1; min-width: 280px; max-width: 400px; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
.search-wrap input { padding-left: 2.5rem; }
.filter-selects { display: flex; gap: 0.75rem; }
.filter-selects select { padding: 0.5rem 2.2rem 0.5rem 1rem; font-size: 0.875rem; width: auto; }
.empty-state { padding: 4rem 2rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1rem; border: 1.5px dashed var(--border-color); border-radius: 12px; }
.empty-icon { background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 50%; color: var(--text-muted); display: inline-flex; }
.reports-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
.report-card { padding: 1.5rem; display: flex; flex-direction: column; height: 240px; position: relative; cursor: pointer; }
.report-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
.report-del { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; transition: var(--transition-smooth); display: inline-flex; }
.report-del:hover { color: var(--color-error); }
.report-title { font-size: 1.05rem; margin-bottom: 0.5rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--text-primary); }
.report-query { font-size: 0.85rem; color: var(--text-muted); margin-bottom: auto; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; }
.report-foot { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 0.75rem; margin-top: 0.75rem; }
.report-date { display: flex; align-items: center; gap: 0.4rem; color: var(--text-muted); font-size: 0.75rem; }
.report-sources { display: flex; align-items: center; gap: 0.2rem; color: var(--color-secondary); font-size: 0.75rem; font-weight: 600; }

/* ---- Config Panel ---- */
.config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 2rem; margin-bottom: 2rem; }
.config-col { padding: 2rem; }
.config-col-head { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
.config-icon { padding: 0.5rem; border-radius: 8px; display: inline-flex; }
.provider-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
.provider-btn { border-radius: 10px; padding: 1rem; cursor: pointer; text-align: left; transition: var(--transition-smooth); background: rgba(255,255,255,0.02); border: 1.5px solid var(--border-color); }
.provider-btn.active-p { background: rgba(139, 92, 246, 0.12); border-color: var(--color-primary); }
.provider-btn.active-s { background: rgba(6, 182, 212, 0.12); border-color: var(--color-secondary); }
.provider-name { font-weight: 600; color: var(--text-secondary); font-size: 0.9rem; }
.provider-btn.active-p .provider-name, .provider-btn.active-s .provider-name { color: var(--text-primary); }
.provider-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
.note-box { background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.75rem; color: var(--text-muted); font-size: 0.74rem; margin-bottom: 1.5rem; line-height: 1.4; }
.warn-box { background: rgba(245, 158, 11, 0.05); border: 1px dashed rgba(245, 158, 11, 0.3); border-radius: 8px; padding: 0.75rem; color: var(--color-warning); font-size: 0.75rem; margin-bottom: 1rem; line-height: 1.4; }
.warn-box code { background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; }
.key-input-wrap { position: relative; display: flex; }
.key-input-wrap input { padding-right: 2.5rem; }
.key-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; display: inline-flex; }
.mock-note { background: rgba(255,255,255,0.02); border: 1px dashed var(--border-color); border-radius: 8px; padding: 1.25rem; color: var(--text-muted); font-size: 0.85rem; display: flex; gap: 0.75rem; align-items: flex-start; flex: 1; }
.result-panel { padding: 1.25rem 1.5rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; }
.result-panel strong { display: block; color: var(--text-primary); margin-bottom: 0.1rem; }
.config-actions { display: flex; gap: 1rem; justify-content: flex-end; flex-wrap: wrap; }

/* ---- New Research ---- */
.nr-header { margin-bottom: 2.5rem; text-align: center; }
.nr-header h1 { font-size: 2.25rem; margin-bottom: 0.5rem; }
.nr-header p { color: var(--text-muted); max-width: 550px; margin: 0 auto; }
.alert-box { padding: 1.25rem 1.5rem; margin-bottom: 2rem; display: flex; gap: 1rem; align-items: center; border-left: 4px solid var(--color-error); background: rgba(239, 68, 68, 0.05); }
.presets-label { font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 0.5rem; }
.presets-row { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.preset-chip { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 20px; padding: 0.4rem 0.8rem; font-size: 0.78rem; color: var(--text-secondary); cursor: pointer; transition: var(--transition-smooth); }
.preset-chip:hover { border-color: var(--color-primary); background: rgba(139, 92, 246, 0.05); }
.opts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
.opt-panel { padding: 1.75rem; }
.opt-panel h3 { font-size: 1.1rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
.depth-option { display: flex; align-items: flex-start; gap: 0.75rem; padding: 1rem; background: rgba(255,255,255,0.01); border: 1.5px solid var(--border-color); border-radius: 10px; cursor: pointer; transition: var(--transition-smooth); margin-bottom: 0.75rem; }
.depth-option.selected { background: rgba(6, 182, 212, 0.08); border-color: var(--color-secondary); }
.depth-option input { margin-top: 3px; accent-color: var(--color-secondary); }
.depth-option-title { display: flex; justify-content: space-between; align-items: center; }
.depth-option-title span:first-child { font-weight: 600; color: var(--text-primary); font-size: 0.9rem; }
.depth-option-time { font-size: 0.75rem; color: var(--color-secondary); font-weight: 600; }
.depth-option-desc { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.25rem; line-height: 1.4; }
.wc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
.wc-btn { background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.5rem; cursor: pointer; transition: var(--transition-smooth); text-align: center; }
.wc-btn.selected { background: rgba(139, 92, 246, 0.12); border-color: var(--color-primary); }
.wc-btn-label { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }
.wc-btn.selected .wc-btn-label { color: var(--text-primary); }
.wc-btn-range { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.15rem; }
.adv-panel { padding: 1.25rem 1.75rem; }
.adv-toggle { background: none; border: none; width: 100%; display: flex; justify-content: space-between; align-items: center; color: var(--text-primary); font-weight: 600; cursor: pointer; font-size: 1rem; padding: 0; }
.adv-body { margin-top: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
.launch-btn { align-self: center; font-size: 1.1rem; padding: 1rem 2.5rem; border-radius: 50px; gap: 0.75rem; box-shadow: 0 0 30px rgba(139, 92, 246, 0.35); margin-top: 1rem; }

/* ---- Live Monitor ---- */
.lm-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 2rem; }
.lm-meta { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-secondary); }
.lm-title { font-size: 1.75rem; margin: 0.5rem 0; line-height: 1.3; }
.lm-stats { display: flex; gap: 1.5rem; color: var(--text-muted); font-size: 0.85rem; }
.lm-stats strong { color: var(--text-primary); }
.stepper-panel { padding: 1.5rem 2rem; margin-bottom: 2rem; }
.stepper { display: flex; justify-content: space-between; position: relative; overflow-x: auto; padding-bottom: 0.5rem; }
.stepper-line-bg { position: absolute; left: 10%; right: 10%; top: 20px; height: 2px; background: var(--border-color); z-index: 1; }
.stepper-line-fg { position: absolute; left: 10%; top: 20px; height: 2px; background: var(--color-secondary); z-index: 1; transition: var(--transition-smooth); }
.step { display: flex; flex-direction: column; align-items: center; z-index: 2; min-width: 80px; }
.step-circle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: var(--transition-smooth); margin-bottom: 0.5rem; border: 2px solid var(--border-color); color: var(--text-muted); background: var(--bg-base); }
.step-circle.done { background: var(--color-secondary); border-color: var(--color-secondary); color: #0b0f19; }
.step-circle.active { border-color: var(--color-secondary); color: var(--color-secondary); box-shadow: var(--shadow-neon); }
.step-label { font-size: 0.8rem; font-weight: 400; color: var(--text-muted); }
.step-label.on { font-weight: 600; color: var(--text-primary); }
.lm-columns { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
.col-head { display: flex; align-items: center; gap: 0.5rem; color: var(--text-primary); margin-bottom: 0.75rem; }
.terminal-viewer { height: 360px; display: flex; flex-direction: column; background: rgba(0,0,0,0.35); border: 1px solid var(--border-color); border-radius: 12px; padding: 1rem; }
.terminal-body { flex: 1; overflow-y: auto; }
.log-line { margin-bottom: 0.5rem; font-family: var(--font-mono); font-size: 0.82rem; }
.log-time { color: var(--text-muted); margin-right: 0.5rem; }
.sources-panel { height: 360px; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; }
.sources-empty { margin: auto; text-align: center; color: var(--text-muted); font-size: 0.85rem; padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
.source-item { background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.75rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.source-info { overflow: hidden; }
.source-title-row { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.15rem; }
.source-title { font-size: 0.82rem; color: var(--text-primary); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; display: block; }
.source-url { font-size: 0.72rem; color: var(--text-muted); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; display: block; }

/* ---- Report Viewer ---- */
.rv-wrap { display: flex; width: 100%; gap: 2rem; height: 100%; position: relative; }
.rv-main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }
.rv-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
.rv-toolbar-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.rv-article-panel { padding: 2.5rem; min-height: 500px; }
.rv-meta-row { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; color: var(--text-muted); font-size: 0.8rem; flex-wrap: wrap; }
.rv-meta-item { display: flex; align-items: center; gap: 0.3rem; }
.article h1 { font-size: 2rem; margin-top: 1.5rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
.article h2 { font-size: 1.4rem; margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--text-primary); }

   Vanilla JS port of the original React/Vite app. No build step, no CDN
   dependencies. Ships with a fully offline "Demo" LLM + Mock search mode
   so the whole flow works out of the box with zero API keys, while still

/* ---------------------------- Icon helpers ---------------------------- */

  download: '<path d="M12 3v12M6 11l6 6 6-6"/><path d="M4 19h16"/>',

  send: '<path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/>',

function icon(name, size, extra) {
  size = size || 18;
  const body = ICON_PATHS[name] || '';
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ' + (extra || '') + '>' + body + '</svg>';
}

/* ---------------------------- Utilities ---------------------------- */
function esc(str) {
  return String(str == null ? '' : str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function uid(prefix) { return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }
function nowTime() { return new Date().toLocaleTimeString(); }
function formatDate(dateString) {
  const opts = { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' };
  return new Date(dateString).toLocaleDateString(undefined, opts);
}
function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return mins + ':' + String(secs).padStart(2, '0');
}
function hostnameOf(url) {
  try { return new URL(url).hostname; } catch (e) { return url; }
}
function debounce(fn, ms) {
  let t;
  return function (...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), ms); };
}

/* ---------------------------- App State ---------------------------- */
const State = {
  activeView: 'config',      // dashboard | config | new-research | live-monitor | report-viewer
  config: null,
  reports: [],
  activeReportId: null,
  chatHistoryMap: {},
  chatLoading: false,
  activeCitation: null,
  showChat: true,
  agentRunToken: 0
};

const DEFAULT_DEMO_CONFIG = {
  llmProvider: 'demo', llmModel: 'deepagent-demo-v1', llmApiKey: '', llmCustomEndpoint: '',
  searchProvider: 'mock', searchApiKey: ''
};

function loadState() {
  State.activeView = 'dashboard';
  try {
    const savedConfig = localStorage.getItem('ai_research_config');
    const savedReports = localStorage.getItem('ai_research_reports');
    if (savedConfig) {
      State.config = JSON.parse(savedConfig);
    } else {
      // No prior setup: auto-provision the offline Demo config so the app
      // is immediately usable, rather than forcing a setup wall on first run.
      State.config = { ...DEFAULT_DEMO_CONFIG };
      persistConfig();
    }
    if (savedReports) State.reports = JSON.parse(savedReports);
  } catch (e) { console.warn('Failed to load saved state', e); }
}

function persistReports() {
  localStorage.setItem('ai_research_reports', JSON.stringify(State.reports));
}
function persistConfig() {
  localStorage.setItem('ai_research_config', JSON.stringify(State.config));
}

function findReport(id) { return State.reports.find(r => r.id === id); }
function updateReport(id, patch) {
  const idx = State.reports.findIndex(r => r.id === id);
  if (idx !== -1) State.reports[idx] = { ...State.reports[idx], ...patch };
}

/* ---------------------------- Mock / Demo Search Service ---------------------------- */
async function searchWeb({ provider, apiKey, query, depth }) {
  if (provider === 'tavily') {
    if (!apiKey) throw new Error('Tavily API key is missing.');
    const res = await fetch('https://api.tavily.com/search', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: apiKey, query, search_depth: depth === 'deep' ? 'advanced' : 'basic', include_answer: false, max_results: depth === 'deep' ? 10 : depth === 'standard' ? 6 : 3 })
    });
    if (!res.ok) throw new Error('Tavily search API error: ' + res.status);
    const data = await res.json();
    return (data.results || []).map((item, idx) => ({ id: String(idx + 1), title: item.title, url: item.url, snippet: item.content, favicon: 'https://www.google.com/s2/favicons?sz=64&domain=' + hostnameOf(item.url) }));
  }
  if (provider === 'brave') {
    if (!apiKey) throw new Error('Brave Search API key is missing.');
    const count = depth === 'deep' ? 10 : depth === 'standard' ? 6 : 3;
    const res = await fetch('https://api.search.brave.com/res/v1/web/search?q=' + encodeURIComponent(query) + '&count=' + count, { headers: { 'X-Subscription-Token': apiKey, 'Accept': 'application/json' } });
    if (!res.ok) throw new Error('Brave Search API error: ' + res.status);
    const data = await res.json();
    return ((data.web && data.web.results) || []).map((item, idx) => ({ id: String(idx + 1), title: item.title, url: item.url, snippet: item.description, favicon: 'https://www.google.com/s2/favicons?sz=64&domain=' + hostnameOf(item.url) }));
  }
  if (provider === 'serper') {
    if (!apiKey) throw new Error('Serper Google Search API key is missing.');
    const res = await fetch('https://google.serper.dev/search', { method: 'POST', headers: { 'X-API-KEY': apiKey, 'Content-Type': 'application/json' }, body: JSON.stringify({ q: query, num: depth === 'deep' ? 10 : depth === 'standard' ? 6 : 3 }) });
    if (!res.ok) throw new Error('Serper Search API error: ' + res.status);
    const data = await res.json();
    return (data.organic || []).map((item, idx) => ({ id: String(idx + 1), title: item.title, url: item.link, snippet: item.snippet, favicon: 'https://www.google.com/s2/favicons?sz=64&domain=' + hostnameOf(item.link) }));
  }

  // Mock mode: simulate realistic search results, fully offline
  const keywords = query.split(' ').filter(k => k.length > 3).slice(0, 3);
  const kwString = keywords.join(' ');
  await new Promise(resolve => setTimeout(resolve, 900));
  const mockDomains = [
    { site: 'wikipedia.org', path: '/wiki/Special_Research' },
    { site: 'techcrunch.com', path: '/2026/future-trends' },
    { site: 'nature.com', path: '/articles/scientific-milestones' },
    { site: 'github.com', path: '/topics/developer-trends' },
    { site: 'medium.com', path: '/deep-dive/modern-syntheses' }
  ];
  const resultsCount = depth === 'deep' ? 8 : depth === 'standard' ? 5 : 2;
  const mockResults = [];
  for (let i = 0; i < resultsCount; i++) {
    const d = mockDomains[i % mockDomains.length];
    const sourceUrl = 'https://' + d.site + d.path + '_' + (i + 1);
    mockResults.push({
      id: String(i + 1),
      title: 'Comprehensive analysis on ' + (kwString || 'Topic') + ' (Part ' + (i + 1) + ')',
      url: sourceUrl,
      snippet: 'This document covers critical reference findings regarding ' + query + '. It details empirical data, methodologies, and outcomes from trials conducted in late 2025.',
      favicon: 'https://www.google.com/s2/favicons?sz=64&domain=' + d.site
    });
  }
  return mockResults;
}

/* ---------------------------- LLM Service (real + demo) ---------------------------- */
async function callLLM({ provider, model, apiKey, customEndpoint, systemPrompt, userPrompt }) {
  if (provider === 'gemini') {
    if (!apiKey) throw new Error('API key is required for Gemini.');
    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: (systemPrompt ? systemPrompt + '\n\n' : '') + userPrompt }] }] })
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error((e.error && e.error.message) || ('API error ' + res.status)); }
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.map(p => p.text).join('') || '';
  }
  if (provider === 'openai') {
    if (!apiKey) throw new Error('API key is required for OpenAI.');
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ model, messages: [{ role: 'system', content: systemPrompt || '' }, { role: 'user', content: userPrompt }] })
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error((e.error && e.error.message) || ('API error ' + res.status)); }
    const data = await res.json();
    return data.choices?.[0]?.message?.content || '';
  }
  if (provider === 'anthropic') {
    if (!apiKey) throw new Error('API key is required for Anthropic.');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model, max_tokens: 4096, system: systemPrompt || '', messages: [{ role: 'user', content: userPrompt }] })
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error((e.error && e.error.message) || ('API error ' + res.status)); }
    const data = await res.json();
    return (data.content || []).map(b => b.text || '').join('');
  }
  if (provider === 'ollama') {
    const endpoint = customEndpoint || 'http://localhost:11434';
    const res = await fetch(endpoint + '/api/generate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, prompt: (systemPrompt ? systemPrompt + '\n\n' : '') + userPrompt, stream: false })
    });
    if (!res.ok) throw new Error('Ollama returned status ' + res.status);
    const data = await res.json();
    return data.response || '';
  }
  // Demo mode: fully offline synthetic responses, pattern-matched off the prompt
  return demoLLM(userPrompt);
}

function demoLLM(prompt) {
  if (/exactly 3 distinct search engine query/i.test(prompt)) {
    const m = prompt.match(/"([^"]+)"/);
    const q = m ? m[1] : 'the topic';
    return JSON.stringify([q, q + ' recent developments 2026', q + ' analysis and data']);
  }
  if (/detailed research plan\/outline/i.test(prompt)) {
    const m = prompt.match(/report on:\s*"([^"]+)"/);
    const q = m ? m[1] : 'the topic';
    return [
      '1. Background & Context for ' + q,
      '2. Key statistics and quantitative findings across sources',
      '3. Divergent viewpoints and open debates',
      '4. Emerging trends and forward outlook',
      '5. Practical implications and recommendations'
    ].join('\n');
  }
  if (/AI Research Writer/i.test(prompt)) {
    return generateDemoReport(prompt);
  }
  if (/Quality Assurance Editor/i.test(prompt)) {
    const m = prompt.match(/---\s*([\s\S]*?)\s*---/);
    return m ? m[1].trim() : prompt;
  }
  if (/research chatbot assistant/i.test(prompt) === false && /Title:/.test(prompt)) {
    return demoChatReply(prompt);
  }
  return demoChatReply(prompt);
}

function generateDemoReport(prompt) {
  const qMatch = prompt.match(/report on:\s*"([^"]+)"/);
  const q = qMatch ? qMatch[1] : 'the requested topic';
  const idsMatch = prompt.match(/\[1\] to \[(\d+)\]/);
  const maxId = idsMatch ? parseInt(idsMatch[1], 10) : 3;
  const cite = (n) => '[' + Math.min(n, maxId) + ']';
  return [
    '## Overview',
    'This report synthesizes current, publicly available material on **' + esc(q) + '**, drawing on multiple independent sources to triangulate the most reliable findings ' + cite(1) + '. Interest in this area has accelerated over the past year, driven by a combination of technical maturity and shifting market demand ' + cite(2) + '.',
    '',
    '## Key Findings',
    '- Adoption trends show consistent, measurable growth quarter over quarter ' + cite(1) + '.',
    '- Independent analyses converge on similar directional conclusions, though the magnitude of impact remains debated ' + cite(3) + '.',
    '- Several practical constraints — cost, standardization, and regulatory clarity — continue to shape the pace of change ' + cite(2) + '.',
    '',
    '## Divergent Perspectives',
    '> Not all sources agree on the timeline for mainstream impact; some emphasize near-term momentum while others urge caution about overstated projections ' + cite(3) + '.',
    '',
    'Where sources conflict, this report favors the interpretation best supported by reproducible, quantitative evidence rather than anecdote.',
    '',
    '## Outlook',
    'Looking ahead, the trajectory suggests continued incremental progress rather than a single inflection point. Stakeholders evaluating ' + esc(q) + ' should track the underlying metrics highlighted above rather than headline narratives alone ' + cite(1) + '.',
    '',
    '## Practical Takeaways',
    '- Prioritize decisions grounded in the most recent, source-verified data.',
    '- Revisit assumptions periodically, as this remains an actively evolving area.',
    '- Cross-reference claims across at least two independent sources before acting on them.'
  ].join('\n');
}

function demoChatReply(userMessage) {
  const msg = (userMessage || '').toLowerCase();
  if (/summar/i.test(msg)) {
    return 'In short: the report finds steady, measurable progress on this topic, with most sources agreeing on the overall direction even though the pace and magnitude are debated. See the Key Findings section for the specifics, and the Divergent Perspectives section for where sources disagree.';
  }
  if (/source|support|evidence/i.test(msg)) {
    return 'The core claims are grounded across the cited sources — see the numbered citation chips inline (e.g. [1], [2]) which map to the source list in this report. Click any citation chip to see its title and link.';
  }
  if (/contradict|disagree|conflict/i.test(msg)) {
    return 'Yes — the "Divergent Perspectives" section calls out where sources diverge, mainly around how quickly the trend will translate into real-world impact. I lean on the more quantitatively-grounded source when the report needs to pick a side.';
  }
  return "That's a fair question. Based on the report content, I'd point you to the relevant section above — try asking me to \"summarize key conclusions\" or \"what sources support the findings\" for a more targeted answer. (This is a demo assistant answering from the report text only.)";
}

/* ---------------------------- Agent Orchestration ---------------------------- */
async function runResearchAgent({ query, depth, style, wordCount, excludeDomains, includeDomains, llmConfig, onLog, onUpdateStatus, onSourcesFound }) {
  const logMessage = (stage, message) => onLog({ timestamp: nowTime(), stage, message });
  try {
    onUpdateStatus('planning');
    logMessage('planning', 'Agent initialized. Preparing research outline for: "' + query + '"');
    logMessage('planning', 'Research parameters set to Depth: ' + depth + ', Style: ' + style + ', Word Count: ' + wordCount);

    const planningPrompt = 'You are an AI Research Planner. The user wants to research the following query:\n"' + query + '"\n\nGenerate a list of exactly 3 distinct search engine query strings that will help gather comprehensive, factual information.\nFormat the response as a simple JSON array of strings. Do not write any markdown outside the JSON.';
    logMessage('planning', 'Connecting to language model to generate search strategies...');
    const planningResponse = await callLLM({ provider: llmConfig.llmProvider, model: llmConfig.llmModel, apiKey: llmConfig.llmApiKey, customEndpoint: llmConfig.llmCustomEndpoint, systemPrompt: 'You are a professional research director. Output only clean JSON array strings.', userPrompt: planningPrompt });

    let searchQueries = [];
    try {
      const cleaned = planningResponse.replace(/```json/g, '').replace(/```/g, '').trim();
      searchQueries = JSON.parse(cleaned);
      if (!Array.isArray(searchQueries)) throw new Error('not array');
    } catch (e) {
      logMessage('warning', 'Failed to parse search query JSON. Falling back to keyword search queries.');
      searchQueries = [query, query + ' recent developments', query + ' analysis data'];
    }
    logMessage('planning', 'Research plan compiled. Target search queries:\n' + searchQueries.map(q => '  - "' + q + '"').join('\n'));

    onUpdateStatus('gathering');
    logMessage('gathering', 'Beginning web source gathering phase...');
    let allSources = [];
    let sourceIdCounter = 1;
    for (let i = 0; i < searchQueries.length; i++) {
      const sQuery = searchQueries[i];
      logMessage('gathering', 'Executing search query [' + (i + 1) + '/' + searchQueries.length + ']: "' + sQuery + '"');
      try {
        const results = await searchWeb({ provider: llmConfig.searchProvider, apiKey: llmConfig.searchApiKey, query: sQuery, depth });
        logMessage('gathering', 'Discovered ' + results.length + ' organic links from search.');
        for (const item of results) {
          const hostname = hostnameOf(item.url);
          if (excludeDomains.some(d => hostname.includes(d))) { logMessage('gathering', 'Skipping excluded domain: ' + hostname); continue; }
          if (allSources.some(s => s.url === item.url)) continue;
          allSources.push({ ...item, id: String(sourceIdCounter) });
          sourceIdCounter++;
        }
        onSourcesFound([...allSources]);
      } catch (err) {
        logMessage('error', 'Failed executing query "' + sQuery + '": ' + err.message);
      }
    }
    if (allSources.length === 0) throw new Error('No web search sources were successfully gathered. Aborting research.');
    logMessage('gathering', 'Scrape cycle completed. Indexed ' + allSources.length + ' unique research sources.');

    onUpdateStatus('synthesizing');
    logMessage('synthesizing', 'Entering Synthesis phase: Reading, cross-referencing, and mapping details...');
    const sourcesSummaryText = allSources.map(s => 'Source ID: [' + s.id + ']\nTitle: ' + s.title + '\nURL: ' + s.url + '\nExcerpt: ' + s.snippet + '\n---').join('\n\n');
    const synthesisPrompt = 'You are an AI Research Synthesizer. Review the following gathered source material:\n\n' + sourcesSummaryText + '\n\nCreate an in-depth, structured outline for a report on: "' + query + '"\nIdentify the core thematic areas, key statistics, and any conflicting viewpoints across the sources.\nFormat the output as a detailed research plan/outline.';
    logMessage('synthesizing', 'Analyzing sources context to draft report outline...');
    const outlineResult = await callLLM({ provider: llmConfig.llmProvider, model: llmConfig.llmModel, apiKey: llmConfig.llmApiKey, customEndpoint: llmConfig.llmCustomEndpoint, systemPrompt: 'You are a senior analyst. Output structured outlines.', userPrompt: synthesisPrompt });
    logMessage('synthesizing', 'Report structure and synthesis outline successfully generated.');

    onUpdateStatus('writing');
    logMessage('writing', 'Entering Draft Writing phase. Synthesizing full markdown report...');
    logMessage('writing', 'Writing instructions: Style=' + style + ', lengthTarget=' + wordCount);
    const styleInstructions = { academic: 'Write in a highly formal, academic style with an abstract, introduction, empirical analysis, and conclusion.', executive: 'Write an Executive Summary style. Focus on data points and actionable summaries.', simplified: 'Write in an easy-to-understand educational style.' };
    const lengthInstructions = { short: 'Target length ~500-800 words.', medium: 'Target length ~1500-2000 words.', long: 'Target length 3000+ words.' };
    const writingPrompt = 'You are an AI Research Writer. Your task is to write a comprehensive report on:\n"' + query + '"\n\nUse the following research outline:\n' + outlineResult + '\n\nAnd ground your findings in the following sources:\n' + sourcesSummaryText + '\n\nCRITICAL INSTRUCTIONS:\n1. Write the entire report in Markdown format.\n2. You MUST include inline citation markers like [1], [2].\n3. Only use source IDs [1] to [' + allSources.length + '].\n4. Style Directive: ' + styleInstructions[style] + '\n5. Length Directive: ' + lengthInstructions[wordCount];
    logMessage('writing', 'Synthesizing source context into report body (this may take a minute)...');
    const draftReport = await callLLM({ provider: llmConfig.llmProvider, model: llmConfig.llmModel, apiKey: llmConfig.llmApiKey, customEndpoint: llmConfig.llmCustomEndpoint, systemPrompt: 'You are a professional technical researcher. Write in rich Markdown.', userPrompt: writingPrompt });
    logMessage('writing', 'Initial report draft generation completed.');

    logMessage('writing', 'Reviewing draft: Validating citations and polishing layout...');
    const reviewPrompt = 'You are a Quality Assurance Editor. Review the following research report:\n\n---\n' + draftReport + '\n---\n\nVerify citation formatting and tone (' + style + '). Output ONLY the final markdown text.';
    const finalReport = await callLLM({ provider: llmConfig.llmProvider, model: llmConfig.llmModel, apiKey: llmConfig.llmApiKey, customEndpoint: llmConfig.llmCustomEndpoint, systemPrompt: 'You are a detail-oriented copyeditor. Output ONLY the final updated markdown.', userPrompt: reviewPrompt });

    logMessage('completed', 'Research report successfully generated and verified.');
    onUpdateStatus('completed');
    return { title: query.split(',')[0].slice(0, 80) || 'Research Report', content: finalReport, sources: allSources };
  } catch (err) {
    logMessage('error', 'Agent execution failed: ' + err.message);
    onUpdateStatus('failed');
    throw err;
  }
}

let dashState = { searchQuery: '', depthFilter: 'all', sortBy: 'newest' };

  const reports = State.reports;

  const totalSources = reports.reduce((acc, r) => acc + ((r.sources && r.sources.length) || 0), 0);
  const avgSources = totalReports > 0 ? (totalSources / totalReports).toFixed(1) : '0';

  let filtered = reports.filter(function (r) {

/* ---- Report Viewer ---- */
function parseInlineStyles(text) {
  return esc(text).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
}
function renderText(text) {
  if (!text) return '';
  return parseInlineStyles(text).replace(/\[(\d+)\]/g, function (m, id) { return '<button type="button" class="citation-tag" data-citation="' + id + '">' + id + '</button>'; });
}
function parseMarkdown(md) {
  if (!md) return '';
  const lines = md.split('\n');
  let out = [], listItems = [], inList = false;
  function flushList() { if (listItems.length) { out.push('<ul>' + listItems.join('') + '</ul>'); listItems = []; inList = false; } }
  lines.forEach(function (line) {
    if (line.startsWith('# ')) { flushList(); out.push('<h1>' + renderText(line.slice(2)) + '</h1>'); }
    else if (line.startsWith('## ')) { flushList(); out.push('<h2>' + renderText(line.slice(3)) + '</h2>'); }
    else if (line.startsWith('### ')) { flushList(); out.push('<h3>' + renderText(line.slice(4)) + '</h3>'); }
    else if (line.startsWith('> ')) { flushList(); out.push('<blockquote>' + renderText(line.slice(2)) + '</blockquote>'); }
    else if (line.startsWith('- ') || line.startsWith('* ')) { inList = true; listItems.push('<li>' + renderText(line.slice(2)) + '</li>'); }
    else if (line.trim() === '---') { flushList(); out.push('<hr/>'); }
    else if (line.trim() === '') { flushList(); }
    else { if (inList) flushList(); out.push('<p>' + renderText(line) + '</p>'); }
  });
  flushList();
  return out.join('');
}

/* ---------------------------- Event Wiring ---------------------------- */
function go(view) { State.activeView = view; render(); }

function wireGlobalEvents() {
  // Sidebar nav
  root.querySelectorAll('[data-nav]').forEach(function (btn) {
    btn.addEventListener('click', function () { go(btn.getAttribute('data-nav')); });
  });

  if (State.activeView === 'dashboard') wireDashboardEvents();
  else if (State.activeView === 'config') wireConfigEvents();
  else if (State.activeView === 'new-research') wireNewResearchEvents();
  else if (State.activeView === 'live-monitor') wireLiveMonitorEvents();
  else if (State.activeView === 'report-viewer') wireReportViewerEvents();
}

/* ---- Dashboard events ---- */

  }

  if (depthFilter) depthFilter.addEventListener('change', function (e) { dashState.depthFilter = e.target.value; render(); });

// lightweight partial re-render for the search box only, to preserve input focus while typing
function renderPartialMain() {
  const main = document.getElementById('main-content');
  const activeEl = document.activeElement;
  const activeId = activeEl ? activeEl.id : null;
  const selStart = activeEl && 'selectionStart' in activeEl ? activeEl.selectionStart : null;
  main.innerHTML = renderMain();
  wireGlobalEvents();
  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) { el.focus(); if (selStart !== null && el.setSelectionRange) { try { el.setSelectionRange(selStart, selStart); } catch (e) {} } }
  }
}

/* ---- Config events ---- */
function wireConfigEvents() {
  if (!cfgState) initCfgState();
  root.querySelectorAll('[data-set-llm-provider]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const p = btn.getAttribute('data-set-llm-provider');

      const defaults = { gemini: 'gemini-1.5-flash', openai: 'gpt-4o-mini', anthropic: 'claude-3-5-sonnet-20240620', ollama: 'llama3', demo: 'deepagent-demo-v1' };
      cfgState.llmModel = defaults[p];
      cfgState.testResult = null;
      render();
    });
  });
  root.querySelectorAll('[data-set-search-provider]').forEach(function (btn) {
    btn.addEventListener('click', function () { cfgState.searchProvider = btn.getAttribute('data-set-search-provider'); cfgState.testResult = null; render(); });
  });
  const modelField = document.getElementById('cfg-llm-model');
  if (modelField) modelField.addEventListener('input', function (e) { cfgState.llmModel = e.target.value; });
  const endpointField = document.getElementById('cfg-llm-endpoint');
  if (endpointField) endpointField.addEventListener('input', function (e) { cfgState.llmCustomEndpoint = e.target.value; });
  const keyField = document.getElementById('cfg-llm-key');
  if (keyField) keyField.addEventListener('input', function (e) { cfgState.llmApiKey = e.target.value; });
  const searchKeyField = document.getElementById('cfg-search-key');
  if (searchKeyField) searchKeyField.addEventListener('input', function (e) { cfgState.searchApiKey = e.target.value; });
  root.querySelectorAll('[data-toggle-key]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const which = btn.getAttribute('data-toggle-key');
      if (which === 'llm') cfgState.showKey = !cfgState.showKey; else cfgState.showSearchKey = !cfgState.showSearchKey;
      render();
    });
  });
  const testBtn = document.getElementById('cfg-test-btn');
  if (testBtn) testBtn.addEventListener('click', async function () {
    cfgState.testingConnection = true; cfgState.testResult = null; render();
    try {
      if (cfgState.llmProvider === 'demo') {
        await new Promise(function (r) { setTimeout(r, 500); });
        cfgState.testResult = { success: true, message: 'Demo mode is fully offline and always ready.' };
      } else {
        const reply = await callLLM({ provider: cfgState.llmProvider, model: cfgState.llmModel, apiKey: cfgState.llmApiKey, customEndpoint: cfgState.llmCustomEndpoint, systemPrompt: 'Respond only with the word OK.', userPrompt: 'Say OK' });
        cfgState.testResult = { success: true, message: 'Successfully connected to ' + cfgState.llmProvider + '. Model responded: "' + String(reply).slice(0, 40) + '"' };
      }
    } catch (err) {
      cfgState.testResult = { success: false, message: err.message || 'Unknown connection error.' };
    }
    cfgState.testingConnection = false;
    render();
  });
  const saveBtn = document.getElementById('cfg-save-btn');
  if (saveBtn) saveBtn.addEventListener('click', function () {
    State.config = {
      llmProvider: cfgState.llmProvider, llmModel: cfgState.llmModel, llmApiKey: cfgState.llmApiKey, llmCustomEndpoint: cfgState.llmCustomEndpoint,
      searchProvider: cfgState.searchProvider, searchApiKey: cfgState.searchApiKey
    };
    persistConfig();
    go('dashboard');
  });
}

    btn.addEventListener('click', function () {
      const idx = parseInt(btn.getAttribute('data-preset'), 10);
      nrState.query = NR_PRESETS[idx].query;
      render();
    });
  });
  root.querySelectorAll('[data-set-depth]').forEach(function (el) {
    el.addEventListener('click', function () { nrState.depth = el.getAttribute('data-set-depth'); render(); });
  });
  const styleSel = document.getElementById('nr-style');
  if (styleSel) styleSel.addEventListener('change', function (e) { nrState.style = e.target.value; });
  root.querySelectorAll('[data-set-wc]').forEach(function (btn) {
    btn.addEventListener('click', function () { nrState.wordCount = btn.getAttribute('data-set-wc'); render(); });
  });
  const advToggle = document.getElementById('nr-adv-toggle');
  if (advToggle) advToggle.addEventListener('click', function () { nrState.showAdvanced = !nrState.showAdvanced; render(); });
  const includeField = document.getElementById('nr-include');
  if (includeField) includeField.addEventListener('input', function (e) { nrState.includeDomains = e.target.value; });
  const excludeField = document.getElementById('nr-exclude');
  if (excludeField) excludeField.addEventListener('input', function (e) { nrState.excludeDomains = e.target.value; });

  const form = document.getElementById('nr-form');
  if (form) form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!nrState.query.trim() || !State.config) return;
    startResearch();
  });
}

function startResearch() {
  const excludeDomains = nrState.excludeDomains.split(',').map(function (d) { return d.trim(); }).filter(Boolean);
  const includeDomains = nrState.includeDomains.split(',').map(function (d) { return d.trim(); }).filter(Boolean);
  const report = {
    id: uid('report'),
    title: nrState.query.slice(0, 80),
    query: nrState.query,
    depth: nrState.depth,
    style: nrState.style,
    wordCount: nrState.wordCount,
    status: 'planning',
    logs: [],
    sources: [],
    content: '',
    createdAt: new Date().toISOString()
  };
  State.reports.unshift(report);
  State.activeReportId = report.id;
  persistReports();
  lmElapsed = 0;
  const myToken = ++State.agentRunToken;

  go('live-monitor');
  startLiveTimer();

  runResearchAgent({
    query: nrState.query, depth: nrState.depth, style: nrState.style, wordCount: nrState.wordCount,
    excludeDomains: excludeDomains, includeDomains: includeDomains, llmConfig: State.config,
    onLog: function (log) {
      if (myToken !== State.agentRunToken) return;
      const r = findReport(report.id); if (!r) return;
      r.logs = (r.logs || []).concat([log]);
      persistReports();
      if (State.activeView === 'live-monitor' && State.activeReportId === report.id) refreshLiveMonitorDom();
    },
    onUpdateStatus: function (status) {
      if (myToken !== State.agentRunToken) return;
      updateReport(report.id, { status: status });
      persistReports();
      if (State.activeView === 'live-monitor' && State.activeReportId === report.id) render();
    },
    onSourcesFound: function (sources) {
      if (myToken !== State.agentRunToken) return;
      updateReport(report.id, { sources: sources });
      persistReports();
      if (State.activeView === 'live-monitor' && State.activeReportId === report.id) refreshLiveMonitorDom();
    }
  }).then(function (result) {
    if (myToken !== State.agentRunToken) return;
    updateReport(report.id, { title: result.title || report.title, content: result.content, sources: result.sources, status: 'completed' });
    persistReports();
    stopLiveTimer();
    if (State.activeView === 'live-monitor' && State.activeReportId === report.id) {
      setTimeout(function () { State.activeReportId = report.id; go('report-viewer'); }, 900);
    }
  }).catch(function () {
    if (myToken !== State.agentRunToken) return;
    updateReport(report.id, { status: 'failed' });
    persistReports();
    stopLiveTimer();
    if (State.activeView === 'live-monitor' && State.activeReportId === report.id) render();
  });
}

/* ---- Live Monitor events ---- */
function startLiveTimer() {
  stopLiveTimer();
  lmTimerInterval = setInterval(function () {
    lmElapsed++;
    const el = document.getElementById('lm-elapsed');
    if (el) el.textContent = formatTime(lmElapsed);
  }, 1000);
}
function stopLiveTimer() { if (lmTimerInterval) { clearInterval(lmTimerInterval); lmTimerInterval = null; } }

function refreshLiveMonitorDom() {
  const main = document.getElementById('main-content');
  if (!main) return;
  main.innerHTML = renderLiveMonitor();
  wireLiveMonitorEvents();
  const termBody = document.getElementById('lm-terminal-body');
  if (termBody) termBody.scrollTop = termBody.scrollHeight;
}

function wireLiveMonitorEvents() {
  const abortBtn = document.getElementById('lm-abort');
  if (abortBtn) abortBtn.addEventListener('click', function () {
    if (!confirm('Abort the current research task?')) return;
    State.agentRunToken++; // invalidates in-flight callbacks
    stopLiveTimer();
    if (State.activeReportId) { updateReport(State.activeReportId, { status: 'failed' }); persistReports(); }
    render();
  });
  const termBody = document.getElementById('lm-terminal-body');
  if (termBody) termBody.scrollTop = termBody.scrollHeight;
}

/* ---- Report Viewer events ---- */
function wireReportViewerEvents() {
  const backBtn = document.getElementById('rv-back');
  if (backBtn) backBtn.addEventListener('click', function () { State.activeCitation = null; go('dashboard'); });

  const report = findReport(State.activeReportId);

  const exportMd = document.getElementById('rv-export-md');
  if (exportMd) exportMd.addEventListener('click', function () {
    if (!report) return;
    downloadFile((report.title || 'report') + '.md', report.content, 'text/markdown');
  });
  const exportHtml = document.getElementById('rv-export-html');
  if (exportHtml) exportHtml.addEventListener('click', function () {
    if (!report) return;
    const htmlDoc = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + esc(report.title) + '</title>' +
      '<style>body{font-family:Georgia,serif;max-width:760px;margin:40px auto;padding:0 20px;line-height:1.6;color:#1a1a1a;} h1,h2,h3{font-family:sans-serif;} blockquote{border-left:3px solid #999;padding-left:1rem;color:#555;}</style></head><body>' +
      parseMarkdown(report.content) + '</body></html>';
    downloadFile((report.title || 'report') + '.html', htmlDoc, 'text/html');
  });
  const printBtn = document.getElementById('rv-print');
  if (printBtn) printBtn.addEventListener('click', function () { window.print(); });

  const toggleChat = document.getElementById('rv-toggle-chat');
  if (toggleChat) toggleChat.addEventListener('click', function () { State.showChat = !State.showChat; render(); });

  // Citation popovers
  root.querySelectorAll('[data-citation]').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      const id = btn.getAttribute('data-citation');
      const src = report && (report.sources || []).find(function (s) { return String(s.id) === String(id); });
      const rect = btn.getBoundingClientRect();
      const mainRect = document.getElementById('main-content').getBoundingClientRect();
      let top = rect.bottom - mainRect.top + document.getElementById('main-content').scrollTop + 8;
      let left = rect.left - mainRect.left;
      if (left + 290 > mainRect.width) left = Math.max(0, mainRect.width - 300);
      State.activeCitation = src ? { ...src, _top: top, _left: left } : { id: id, title: 'Source not found', url: '#', snippet: 'This citation could not be matched to a gathered source.', _top: top, _left: left };
      render();
    });
  });
  const closeBtn = document.getElementById('citation-close');
  if (closeBtn) closeBtn.addEventListener('click', function () { State.activeCitation = null; render(); });
  const backdrop = document.getElementById('citation-backdrop');
  if (backdrop) backdrop.addEventListener('click', function () { State.activeCitation = null; render(); });

  // Chat
  const chatForm = document.getElementById('chat-form');
  if (chatForm) chatForm.addEventListener('submit', function (e) {
    e.preventDefault();
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || State.chatLoading) return;
    sendChatMessage(text);
  });
  root.querySelectorAll('[data-chat-preset]').forEach(function (btn) {
    btn.addEventListener('click', function () { sendChatMessage(btn.getAttribute('data-chat-preset')); });
  });
  const chatBody = document.getElementById('chat-body');
  if (chatBody) chatBody.scrollTop = chatBody.scrollHeight;
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
}

async function sendChatMessage(text) {
  const reportId = State.activeReportId;
  const report = findReport(reportId);
  if (!report) return;
  const history = State.chatHistoryMap[reportId] || (State.chatHistoryMap[reportId] = []);
  history.push({ role: 'user', content: text });
  State.chatLoading = true;
  render();

  try {
    const contextPrompt = 'You are a research chatbot assistant. The user is asking questions about the following report.\n\nTitle: ' + report.title + '\n\nReport Content:\n' + report.content.slice(0, 6000) + '\n\nUser question: ' + text + '\n\nAnswer conversationally and concisely, grounded only in the report content above.';
    const reply = await callLLM({ provider: State.config.llmProvider, model: State.config.llmModel, apiKey: State.config.llmApiKey, customEndpoint: State.config.llmCustomEndpoint, systemPrompt: 'You are a helpful, concise research assistant chatbot.', userPrompt: contextPrompt });
    history.push({ role: 'assistant', content: reply || "I couldn't generate a response for that." });
  } catch (err) {
    history.push({ role: 'assistant', content: 'Error: ' + err.message });
  }
  State.chatLoading = false;
  render();
}

/* ---------------------------- Init ---------------------------- */
loadState();
render();

</script>
